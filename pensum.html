<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pensum | Salsa Soul Studio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --gold: #c9a84c; --gold-light: #e8c96a; --gold-dark: #8a6820; --black: #0a0a0a; --dark: #111111; --dark2: #1a1a1a; }
    body { font-family: 'Georgia', serif; background: var(--black); color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
    .header { background: #000; text-align: center; padding: 60px 20px 30px; border-bottom: 1px solid #1f1600; }
    .header img { width: 280px; max-width: 70%; margin-bottom: 24px; }
    .header h1 { color: var(--gold); font-size: 1.8rem; letter-spacing: 3px; text-transform: uppercase; }
    .header .subtitle { color: #888; font-style: italic; margin-top: 8px; font-size: 0.95rem; }
    .content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 24px; }
    .dance-grid { display: flex; gap: 30px; max-width: 700px; width: 100%; }
    .dance-card { flex: 1; background: var(--dark2); border: 1px solid var(--gold-dark); border-radius: 10px; padding: 50px 24px; text-align: center; text-decoration: none; position: relative; overflow: hidden; transition: transform 0.2s, border-color 0.2s; }
    .dance-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--gold-dark), var(--gold-light), var(--gold-dark)); }
    .dance-card:hover { transform: translateY(-4px); border-color: var(--gold); }
    .dance-card .emoji { font-size: 3.5rem; margin-bottom: 16px; }
    .dance-card .dance-name { color: var(--gold); font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }
    .dance-card .dance-desc { color: #888; font-size: 0.9rem; margin-top: 10px; font-style: italic; }
    .dance-card .arrow { color: var(--gold-light); font-size: 1.2rem; margin-top: 20px; display: block; }
    footer { background: #000; border-top: 1px solid #1f1600; text-align: center; padding: 32px 20px; color: #444; font-size: 0.82rem; }
    footer .gold { color: var(--gold); }
    footer a { color: var(--gold-light); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    @media (max-width: 600px) { .dance-grid { flex-direction: column; } .header h1 { font-size: 1.4rem; } .dance-card { padding: 40px 20px; } }
  </style>
</head>
<body>

  <div class="header">
    <a href="index.html"><img src="logo-dorado.png" alt="Salsa Soul Studio"></a>
    <h1>Pensum Salsa Soul Studio</h1>
    <p class="subtitle">Todos los pasos y exámenes por nivel</p>
  </div>

  <div class="content">
    <div class="dance-grid">
      <a href="pensum-salsa.html" class="dance-card">
        <div class="emoji">💃</div>
        <div class="dance-name">Salsa</div>
        <div class="dance-desc">Pensum completo + Exámenes</div>
        <span class="arrow">Ver pasos &rarr;</span>
      </a>
      <a href="pensum-bachata.html" class="dance-card">
        <div class="emoji">🕺</div>
        <div class="dance-name">Bachata</div>
        <div class="dance-desc">Pensum completo + Exámenes</div>
        <span class="arrow">Ver pasos &rarr;</span>
      </a>
    </div>
  </div>

  <footer>
    <p><span class="gold">Salsa Soul Studio</span> · Asunción, Paraguay</p>
    <p style="margin-top:6px;"><a href="index.html">Inicio</a></p>
  </footer>

</body>
</html>
