<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sociales NY2CALI | Salsa Soul Studio</title>
  <meta name="description" content="Próximas fechas de los sociales NY2CALI de Salsa Soul Studio. Reservá tu mesa.">
  <link rel="icon" href="/logo-dorado.png">
  <meta property="og:title" content="Sociales NY2CALI · Salsa Soul Studio">
  <meta property="og:description" content="Próximas fechas y reserva de mesas 💃🕺">
  <meta property="og:image" content="/sociales/ny2cali.png">
  <style>
    :root{
      --gold:#c9a84c; --gold-light:#e8c96a; --gold-dark:#8a6820;
      --black:#0a0a0a; --dark:#111; --dark2:#1a1a1a;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Georgia',serif; background:var(--black); color:#fff;
      min-height:100vh; -webkit-tap-highlight-color:transparent;
    }
    a{color:inherit;text-decoration:none}

    /* NAV */
    .nav{
      position:sticky;top:0;z-index:50; display:flex;align-items:center;gap:12px;
      padding:14px 20px; background:rgba(10,10,10,.92); backdrop-filter:blur(8px);
      border-bottom:1px solid rgba(201,168,76,.25);
    }
    .nav img{height:38px}
    .nav .back{margin-left:auto;font-size:.85rem;color:var(--gold-light);opacity:.9}

    /* HERO */
    .hero{text-align:center;padding:30px 20px 6px}
    .hero h1{
      font-size:1.9rem;letter-spacing:.5px;
      background:linear-gradient(90deg,var(--gold-dark),var(--gold-light),var(--gold-dark));
      -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    }
    .hero p{color:#bbb;margin-top:8px;font-size:.95rem}
    .flyer{
      display:block;width:100%;max-width:330px;margin:20px auto 4px;border-radius:16px;
      border:1px solid rgba(201,168,76,.3);box-shadow:0 8px 30px rgba(0,0,0,.5);
    }
    .divider{
      width:70px;height:3px;margin:18px auto 6px;border-radius:2px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
    }

    /* CONTENEDOR */
    .wrap{padding:14px 16px 60px;max-width:760px;margin:0 auto}

    /* CARD DE SOCIAL */
    .social{
      background:var(--dark2);border:1px solid rgba(201,168,76,.2);border-radius:16px;
      padding:20px 18px;margin-bottom:22px;
    }
    .social-fecha{font-size:1.25rem;color:var(--gold-light);text-transform:capitalize;font-weight:bold}
    .social-meta{color:#aaa;font-size:.9rem;margin-top:4px}
    .social-meta .pin{color:var(--gold)}
    .mesas-label{color:#888;font-size:.82rem;letter-spacing:.4px;margin:16px 0 10px;text-transform:uppercase}

    /* GRID DE MESAS */
    .mesas{display:grid;grid-template-columns:1fr;gap:10px}
    @media(min-width:560px){.mesas{grid-template-columns:1fr 1fr}}
    .mesa{
      display:flex;flex-direction:column;gap:8px;
      background:var(--dark);border:1px solid rgba(201,168,76,.18);border-radius:12px;padding:13px 15px;
    }
    .mesa-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
    .mesa-nom{font-size:1.02rem;color:#fff;font-weight:bold}
    .mesa-precio{color:var(--gold-light);font-size:.92rem;white-space:nowrap}
    .mesa-disp{font-size:.82rem;color:#9a9a9a}
    .mesa-disp.pocos{color:#e0a14c}
    .btn-reservar{
      margin-top:2px;text-align:center;padding:10px;border-radius:999px;font-family:inherit;
      background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:#0a0a0a;font-weight:bold;
      font-size:.9rem;cursor:pointer;transition:filter .2s;
    }
    .btn-reservar:hover{filter:brightness(1.12)}
    .mesa.agotada{opacity:.5}
    .agotada-tag{
      margin-top:2px;text-align:center;padding:10px;border-radius:999px;
      background:rgba(255,255,255,.06);color:#888;font-size:.85rem;
    }

    /* ESTADOS */
    .estado{text-align:center;padding:70px 24px;color:#999}
    .estado .big{font-size:2.4rem;margin-bottom:14px}
    .spin{
      width:38px;height:38px;margin:60px auto;border-radius:50%;
      border:3px solid rgba(201,168,76,.25);border-top-color:var(--gold);
      animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    footer{text-align:center;padding:28px 20px;color:#666;font-size:.85rem;border-top:1px solid rgba(201,168,76,.12)}
    footer .gold{color:var(--gold)}
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/"><img src="/logo-dorado.png" alt="Salsa Soul Studio"></a>
    <a href="/" class="back">← Volver al inicio</a>
  </nav>

  <div class="hero">
    <h1>Sociales NY2CALI</h1>
    <p>Salsa · Bachata · Amigos · Buena vibra 💃🕺</p>
    <img class="flyer" src="ny2cali.png" alt="Próximas fechas de los sociales NY2CALI">
    <div class="divider"></div>
  </div>

  <div class="wrap" id="wrap">
    <div class="spin" id="spin"></div>
  </div>

  <footer>
    <p><span class="gold">Salsa Soul Studio</span> · Asunción, Paraguay</p>
    <p style="margin-top:6px">Disfruta la vida bailando 🕺💃</p>
  </footer>

  <script>
    // Número de WhatsApp de Dorita (Salsa Soul) — cierra la reserva por chat
    const WA = "595971889475";

    function fmtFecha(iso){
      const dt = new Date(iso);
      const f = new Intl.DateTimeFormat('es',{weekday:'long',day:'numeric',month:'long',timeZone:'America/Asuncion'}).format(dt);
      return f.charAt(0).toUpperCase() + f.slice(1); // "Sábado 25 de julio"
    }
    function fmtHora(iso){
      return new Intl.DateTimeFormat('es',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'America/Asuncion'}).format(new Date(iso));
    }
    function fmtGs(n){ return (n||0).toLocaleString('es-PY') + " Gs"; }

    function linkReserva(mesa, social){
      const txt = `Hola! 💃 Quiero reservar la mesa *${mesa.nombre}* para el social NY2CALI del *${fmtFecha(social.fecha)}*. ¿Me ayudás? 🙌`;
      return `https://wa.me/${WA}?text=${encodeURIComponent(txt)}`;
    }

    function render(sociales){
      const wrap = document.getElementById("wrap");
      if(!sociales.length){
        wrap.innerHTML = '<div class="estado"><div class="big">🗓️</div>No hay sociales con fecha abierta por ahora.<br><span style="font-size:.9rem;opacity:.8">Volvé pronto 😊</span></div>';
        return;
      }
      wrap.innerHTML = sociales.map(s => {
        const hora = s.fecha ? fmtHora(s.fecha) : "";
        const cabecera =
          `<div class="social-fecha">${s.fecha ? fmtFecha(s.fecha) : s.nombre}</div>
           <div class="social-meta">${hora ? "🕗 "+hora+" hs" : ""}${s.lugar ? ' · <span class="pin">📍 '+s.lugar+'</span>' : ""}</div>`;

        let mesasHtml;
        if(!s.mesas.length){
          mesasHtml = '<div class="mesa-disp" style="margin-top:8px">Mesas en breve 🪑</div>';
        }else{
          mesasHtml = '<div class="mesas">' + s.mesas.map(m => {
            const dispTxt = m.disponibles >= m.capacidad
              ? `${m.capacidad} lugares`
              : `${m.disponibles} de ${m.capacidad} libres`;
            const pocos = !m.agotada && m.disponibles > 0 && m.disponibles <= 3 ? " pocos" : "";
            const accion = m.agotada
              ? '<div class="agotada-tag">Agotada</div>'
              : `<a class="btn-reservar" href="${linkReserva(m, s)}" target="_blank" rel="noopener">Reservar por WhatsApp</a>`;
            return `<div class="mesa${m.agotada ? ' agotada' : ''}">
                      <div class="mesa-top">
                        <span class="mesa-nom">${m.nombre}</span>
                        <span class="mesa-precio">${fmtGs(m.precio)}/persona</span>
                      </div>
                      <div class="mesa-disp${pocos}">${m.agotada ? "Sin lugares" : dispTxt}</div>
                      ${accion}
                    </div>`;
          }).join("") + '</div>';
        }
        return `<div class="social">${cabecera}<div class="mesas-label">Mesas disponibles</div>${mesasHtml}</div>`;
      }).join("");
    }

    async function init(){
      try{
        const r = await fetch("/api/sociales?t=" + Date.now());
        const data = await r.json();
        if(data.error) throw new Error(data.error);
        render(data.sociales || []);
      }catch(e){
        document.getElementById("wrap").innerHTML =
          '<div class="estado"><div class="big">😕</div>No pude cargar los sociales. Probá de nuevo en un rato.</div>';
      }
    }

    init();
  </script>
</body>
</html>
